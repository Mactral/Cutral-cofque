<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Registro</title>
        <link rel="stylesheet" type="text/css" href="/style.css" media="screen" />
    </head>
    <body>
        <main>
        <h1 class="titulo">Registro de sesión</h1>
            <form>
            <p>
                Nombre y apellido: <input placeholder="Ingrese su nombre y apellido" type="text">
            </p>
            <p>
                <label for="documento">Selecciona un tipo de documento:&nbsp;</label>
                <select>
                    <option value="rut">RUT</option>
                    <option value="dni">DNI</option>
                    <option value="cedula">Cedula</option>
                    <option value="pasaporte">Pasaporte</option>
                </select>
            </p>
            <p>
            Ingrese el número de documento: <input type="number" name="nDeDocumento">
            </p>
            <p>
            Ingrese fecha de nacimiento: <input type="date" name="fechaDeNacimiento">
            </p>
            <p class="radio">
            <label>Ingrese su sexo:</label>
                
            <input type="radio" class="radio" name="sexo" value="masculino">
            <label for="opcion1" class="radio">Masculino</label>
            <input type="radio" id="opcion2" name="sexo" value="femenino">
            <label for="opcion2">Femenino</label>
            </p>
            <p>
            Correo electronico: <input type="email" placeholder="Ingrese su correo">    
            </p>
            <p>
            Ingrese su número de télefono: <input type="tel" placeholder="+569">
            </p>
            <p>
                <label for="comentarios">Comentarios:</label><br>
                <textarea id="comentarios" name="comentarios" rows="4" cols="40" placeholder="Ingrese aquí si desea colocar datos adicionales"></textarea>
            </p>
                <button type="submit">Enviar</button>
            </form>
        </main>
    </body>
</html>
